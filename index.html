<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess Who I Am</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="shell">
    <section class="game-frame" aria-label="Guess Who I Am game">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">?</span>
          <div>
            <p class="eyebrow">Mind reader</p>
            <h1>Guess Who I Am</h1>
          </div>
        </div>
          <div class="score-strip" aria-label="Game stats">
            <div>
              <span id="turnCount">0</span>
              <small>questions</small>
            </div>
            <div>
              <span id="guessCount">0</span>
              <small>guesses</small>
            </div>
            <div>
              <span id="knowledgeCount">--</span>
              <small>known</small>
            </div>
          </div>
      </header>

      <div class="stage">
        <aside class="insight-panel" aria-label="Machine confidence">
          <div class="visual-card">
            <img src="assets/image.png" alt="Stylized board of celebrity silhouettes" class="hero-art" />
            <div class="pulse-ring" aria-hidden="true"></div>
          </div>

          <div class="meter-block">
            <div class="meter-label">
              <span>Confidence</span>
              <strong id="confidenceText">12%</strong>
            </div>
            <div class="meter" aria-hidden="true">
              <span id="confidenceBar"></span>
            </div>
          </div>

          <div class="candidate-box">
            <div class="section-title">
              <span>Mind signals</span>
              <button class="icon-button" id="resetButton" type="button" aria-label="Reset game">
                <span aria-hidden="true">R</span>
              </button>
            </div>
            <div class="candidate-list" id="candidateList"></div>
          </div>
        </aside>

        <section class="play-panel">
          <div class="conversation" id="conversation" aria-live="polite"></div>

          <div class="answer-dock" id="answerDock">
            <button class="answer-button" type="button" data-answer="yes">Yes</button>
            <button class="answer-button" type="button" data-answer="probably">Probably</button>
            <button class="answer-button" type="button" data-answer="no">No</button>
            <button class="answer-button" type="button" data-answer="probably_not">Probably not</button>
            <button class="answer-button" type="button" data-answer="maybe">Maybe</button>
            <button class="answer-button" type="button" data-answer="unknown">Don't know</button>
          </div>

          <div class="guess-dock hidden" id="guessDock">
            <button class="primary-button" type="button" id="correctButton">Correct</button>
            <button class="secondary-button" type="button" id="wrongButton">Not them</button>
          </div>

          <button class="start-button" type="button" id="startButton">
            Start a round
          </button>
        </section>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>
